<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>100 Contributions 🎉</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 50px 40px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00f5ff, #00ffa2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 {
      font-size: 1.3rem;
      font-weight: 400;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .count {
      font-size: 4.5rem;
      font-weight: 700;
      margin: 20px 0;
      color: #00ffa2;
      text-shadow: 0 0 20px rgba(0,255,162,0.6);
    }

    button {
      margin-top: 25px;
      padding: 14px 36px;
      font-size: 1.1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, #00f5ff, #00ffa2);
      color: #000;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,255,200,0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 16px 40px rgba(0,255,200,0.6);
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background: red;
      top: -10px;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    .message {
      margin-top: 20px;
      font-size: 1.2rem;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.5s ease;
    }

    .message.show {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Congratulations 🎉</h1>
    <h2>For officially completing</h2>
    <div class="count">100</div>
    <h2>Contributions this year 🚀</h2>

    <button onclick="celebrate()">Celebrate 🎊</button>
    <div class="message" id="msg">Consistency. Discipline. Growth. 💚<br>You earned this!</div>
  </div>

  <script>
    function celebrate() {
      const msg = document.getElementById('msg');
      msg.classList.add('show');

      for (let i = 0; i < 120; i++) {
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        document.body.appendChild(confetti);

        const size = Math.random() * 8 + 6;
        confetti.style.width = size + 'px';
        confetti.style.height = size + 'px';
        confetti.style.left = Math.random() * window.innerWidth + 'px';
        confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`;
        confetti.style.animationDuration = Math.random() * 2 + 3 + 's';

        setTimeout(() => confetti.remove(), 5000);
      }
    }
  </script>

</body>
</html>
