<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday To Me 🎂</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: white;
      overflow: hidden;
    }

    .card {
      background: rgba(0, 0, 0, 0.3);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      background: white;
      color: #ff4b5c;
      font-weight: bold;
      transition: 0.3s;
      margin-top: 15px;
    }

    button:hover {
      background: #ff4b5c;
      color: white;
    }

    /* Cake */
    .cake-container {
      margin-top: 30px;
      display: none;
      position: relative;
    }

    .cake {
      width: 120px;
      height: 80px;
      background: #ff4b5c;
      border-radius: 10px 10px 20px 20px;
      margin: auto;
      position: relative;
    }

    .icing {
      width: 120px;
      height: 25px;
      background: #fff;
      border-radius: 15px;
      position: absolute;
      top: -15px;
    }

    .knife {
      width: 100px;
      height: 5px;
      background: silver;
      position: absolute;
      top: -40px;
      left: 10px;
      transform: rotate(-45deg);
      transform-origin: left;
      opacity: 0;
    }

    @keyframes cutCake {
      0% { transform: rotate(-45deg) translateY(0); opacity: 1; }
      50% { transform: rotate(0deg) translateY(40px); }
      100% { transform: rotate(0deg) translateY(60px); }
    }

    .cut {
      animation: cutCake 1.5s forwards;
    }

    .slice-line {
      width: 3px;
      height: 80px;
      background: white;
      position: absolute;
      left: 58px;
      top: 0;
      opacity: 0;
    }

    .show-slice {
      opacity: 1;
      transition: 0.5s;
    }

  </style>
</head>
<body>

  <div class="card">
    <h1>🎉 Happy Birthday To Me! 🎂</h1>
    <p>Another year older, wiser, and stronger 💪</p>
    <button onclick="cutCake()">Cut the Cake 🎁</button>

    <div class="cake-container" id="cakeBox">
      <div class="knife" id="knife"></div>
      <div class="cake">
        <div class="icing"></div>
        <div class="slice-line" id="slice"></div>
      </div>
    </div>
  </div>

  <script>
    function cutCake() {
      const cakeBox = document.getElementById("cakeBox");
      const knife = document.getElementById("knife");
      const slice = document.getElementById("slice");

      cakeBox.style.display = "block";
      knife.classList.add("cut");

      setTimeout(() => {
        slice.classList.add("show-slice");
      }, 1000);
    }
  </script>

</body>
</html>
