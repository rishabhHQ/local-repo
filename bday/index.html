<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday To Me 🎂</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: white;
    }

    .card {
      background: rgba(0, 0, 0, 0.3);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      background: white;
      color: #ff4b5c;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #ff4b5c;
      color: white;
    }

    .hidden-message {
      margin-top: 20px;
      font-size: 18px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🎉 Happy Birthday To Me! 🎂</h1>
    <p>Another year older, wiser, and stronger 💪</p>
    <button onclick="showMessage()">Click for Surprise 🎁</button>
    <div class="hidden-message" id="message">
      I’m proud of how far I’ve come.  
      This year is going to be amazing! 🚀✨
    </div>
  </div>

  <script>
    function showMessage() {
      document.getElementById("message").style.display = "block";
    }
  </script>

</body>
</html>
