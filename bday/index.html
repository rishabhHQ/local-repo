<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday To Me 🎂</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>🎉 Happy Birthday To Me! 🎂</h1>
  <p>Another year older, wiser, and stronger 💪</p>

  <button onclick="showCake()">Start Celebration 🎊</button>
  <button onclick="blowCandle()">Blow Candle 🕯️</button>
  <button onclick="cutCake()">Cut the Cake 🔪</button>

  <div class="cake-container" id="cakeBox">
    <div class="knife" id="knife"></div>
    <div class="cake">
      <div class="icing"></div>
      <div class="candle">
        <div class="flame" id="flame"></div>
      </div>
      <div class="slice-line" id="slice"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
